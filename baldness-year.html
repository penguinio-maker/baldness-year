<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baldness Year Calculator</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
      font-weight: 700;
      background: linear-gradient(120deg, #6f3bff, #2e6dff, #2e6dff, #3f86ff, #ff7ad9);
      color: #2b1c18;
    }

    .page {
      width: min(560px, 92vw);
    }

    .card {
      width: 100%;
      background: #2b1c18;
      border: 2px solid #2b1c18;
      border-radius: 20px;
      min-height: 360px;
      padding: 22px;
      color: #fff8f2;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .content-wrapper {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 13px;
    }

    .page-title {
      margin: 0;
      width: 100%;
      max-width: 440px;
      font-size: clamp(1.2rem, 2.4vw, 1.65rem);
      font-weight: 900;
      letter-spacing: 0.005em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1.2;
    }

    .subtitle {
      line-height: 1.5;
      width: 100%;
      max-width: 420px;
      margin: 0;
      text-align: center;
      font-weight: 600;
    }

    .input-wrap {
      position: relative;
      width: 100%;
      max-width: 270px;
    }

    input, button {
      box-sizing: border-box;
      display: block;
      appearance: none;
      font: inherit;
      padding: 14px 16px;
      border: 2px solid #2b1c18;
      border-radius: 12px;
      transition: box-shadow 180ms ease, transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    input {
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: #9b84ff;
      box-shadow: 0 0 0 4px rgba(155, 132, 255, 0.26);
    }

    button {
      cursor: pointer;
      background: #dbe9ff;
      border-color: #bcd5ff;
      color: #2b1c18;
      font-weight: 700;
      width: 100%;
      max-width: 270px;
    }

    button:hover {
      background: #cfe2ff;
    }

    button:focus-visible,
    button:active {
      outline: none;
      border-color: #9b84ff;
      box-shadow: 0 0 0 4px rgba(155, 132, 255, 0.24);
      transform: translateY(1px);
    }

    .fake-caret {
      position: absolute;
      left: calc(16px + 11ch);
      top: 50%;
      transform: translateY(-50%);
      color: #7a6f6b;
      pointer-events: none;
      animation: caret-blink 1s steps(1, end) infinite;
    }

    @keyframes caret-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .input-wrap.has-text .fake-caret,
    .input-wrap:focus-within .fake-caret {
      display: none;
    }

    #result {
      margin: 0;
      min-height: 0;
      font-weight: 700;
      width: 100%;
      max-width: 540px;
      text-align: center;
      line-height: 1.45;
    }

    #result:empty {
      display: none;
    }

    .result-year {
      font-size: 1.2rem;
      font-weight: 900;
    }

    .scanner-loading {
      width: 100%;
      max-width: 540px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.06);
    }

    .scanner-title {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .scanner-line {
      font-weight: 700;
    }

    .analysis-panel {
      width: 100%;
      max-width: 540px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.06);
      animation: panel-in 280ms ease forwards;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
      overflow: hidden;
    }

    .analysis-panel > * {
      position: relative;
      z-index: 1;
    }

    .analysis-kicker {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      opacity: 0.95;
    }

    .analysis-handle {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .analysis-label {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    .analysis-year {
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      line-height: 1;
      font-weight: 900;
      margin: 6px 0;
    }

    .analysis-message {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .analysis-metrics {
      display: grid;
      gap: 4px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .analysis-decor {
      position: absolute;
      left: -2%;
      right: -2%;
      bottom: -10px;
      height: 120px;
      z-index: 0;
      opacity: 0.22;
      pointer-events: none;
    }

    .analysis-decor svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .result-watermark {
      position: absolute;
      right: 12px;
      bottom: 8px;
      font-size: 12px;
      letter-spacing: 0.05em;
      color: #bcdfff;
      opacity: 0.28;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 8px rgba(103, 232, 249, 0.18);
      z-index: 1;
      white-space: nowrap;
    }

    .ui-watermark {
      position: absolute;
      right: 12px;
      top: 10px;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: #9ecbff;
      opacity: 0.2;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .page-watermark {
      margin-top: 10px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #d8eaff;
      opacity: 0.22;
      user-select: none;
      pointer-events: none;
    }

    .result-actions {
      width: 100%;
      max-width: 540px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .export-btn {
      width: auto;
      min-width: 150px;
      padding: 11px 14px;
      border-radius: 11px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease, border-color 160ms ease;
    }

    .download-btn {
      background: #b8a9ff;
      border-color: rgba(255, 255, 255, 0.45);
      color: #1c1334;
    }

    .copy-btn {
      background: #9be7f3;
      border-color: rgba(255, 255, 255, 0.45);
      color: #0d2b33;
    }

    .export-btn:hover {
      filter: brightness(1.04);
      box-shadow: 0 0 0 4px rgba(185, 172, 255, 0.18);
    }

    .export-btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(155, 132, 255, 0.26);
    }

    .export-btn:active {
      transform: translateY(1px);
      filter: brightness(0.99);
    }

    .export-status {
      width: 100%;
      max-width: 540px;
      margin-top: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      opacity: 0.95;
    }

    @media (max-width: 520px) {
      .result-actions {
        flex-direction: column;
        align-items: center;
      }

      .export-btn {
        width: 100%;
        max-width: 320px;
      }

      .result-watermark {
        right: 10px;
        bottom: 6px;
        font-size: 11px;
      }
    }

    @keyframes panel-in {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-main,
    .result-roast,
    .result-loading,
    .result-error {
      font-weight: 600;
      margin-top: 4px;
    }

    .result-error {
      color: #ffc9c9;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="card">
      <div class="ui-watermark">by @PenguinWeb3</div>
      <div class="content-wrapper">
        <h1 class="page-title">When You Go Bald</h1>
        <p class="subtitle">Enter your twitter handle to see<br>the exact year you go bald</p>
        <div class="input-wrap" id="input-wrap">
          <input id="handle" type="text" placeholder="@PenguinWeb3" required />
          <span class="fake-caret" aria-hidden="true">|</span>
        </div>
        <button id="predict-btn" type="button">Predict the Year</button>

        <p id="result" aria-live="polite"></p>
      </div>
    </main>
    <div class="page-watermark">by @PenguinWeb3</div>
  </div>

  <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script>
    const predictBtn = document.getElementById('predict-btn');
    const handleInput = document.getElementById('handle');
    const inputWrap = document.getElementById('input-wrap');
    const result = document.getElementById('result');
    const MIN_YEAR = 2026;
    const MAX_YEAR = 2059;
    const ALGORITHM_VERSION = 'v2';

    const syncCaret = () => {
      inputWrap.classList.toggle('has-text', handleInput.value.length > 0);
    };

    // Normalize user input into a stable handle format.
    function normalizeHandle(input) {
      return input.trim().toLowerCase().replace(/^@+/, '');
    }

    // Accept only Twitter/X-like handles: letters, numbers, underscores, 1-15 chars.
    function isValidHandle(handle) {
      return /^[a-z0-9_]{1,15}$/.test(handle);
    }

    // Deterministic string hash (djb2 variant) for stable predictions.
    function hashString(str) {
      let hash = 5381;
      for (const ch of str) {
        hash = ((hash << 5) + hash) + ch.charCodeAt(0);
      }
      return Math.abs(hash);
    }

    function clampYear(year) {
      return Math.max(MIN_YEAR, Math.min(MAX_YEAR, year));
    }

    // Predict year from base hash and meme modifiers.
    function predictBaldYear(handle) {
      const hash = hashString(handle + ALGORITHM_VERSION);
      const yearRange = MAX_YEAR - MIN_YEAR + 1;
      let year = MIN_YEAR + (hash % yearRange);

      if (handle.includes('btc')) year -= 2;
      if (handle.includes('sol')) year -= 3;
      if (handle.includes('eth')) year += 1;
      if (handle.includes('moon')) year -= 2;
      if (handle.includes('100x')) year -= 2;
      if (handle.includes('gem')) year -= 1;
      if (handle.includes('pepe')) year -= 2;
      if (handle.includes('doge')) year -= 1;
      if (handle.includes('ai')) year -= 1;

      const digitMatches = handle.match(/\d/g) || [];
      if (digitMatches.length >= 4) year -= 1;
      if (handle.length >= 12) year += 1;

      return { year: clampYear(year), hash };
    }

    function getBaldnessMessage(year) {
      if (year <= 2030) return 'Severe CT stress detected.';
      if (year <= 2037) return 'Early signs of market-induced baldness.';
      if (year <= 2045) return 'Moderate cope resistance.';
      if (year <= 2052) return 'Impressive scalp durability.';
      return 'Diamond scalp. Elite survival genetics.';
    }

    function getRoastLine(hash) {
      const roasts = [
        'Too many chart screenshots detected.',
        'High exposure to leverage posting.',
        'Excessive altcoin optimism confirmed.',
        'Strong bagholder aura detected.',
        'On-chain stress levels are concerning.',
        "Too much 'we are early' energy.",
        'Meme coin radiation exposure confirmed.',
        'Exit liquidity tendencies detected.'
      ];
      return roasts[hash % roasts.length];
    }

    function getScannerStats(hash) {
      const hairlineStability = 35 + (hash % 66);
      const leverageLevels = ['LOW', 'MEDIUM', 'HIGH', 'CRITICAL'];
      const radiationLevels = ['STABLE', 'ELEVATED', 'DETECTED'];
      const leverageExposure = leverageLevels[(Math.floor(hash / 7)) % leverageLevels.length];
      const altcoinRadiation = radiationLevels[(Math.floor(hash / 11)) % radiationLevels.length];

      return { hairlineStability, leverageExposure, altcoinRadiation };
    }

    function setLoadingState() {
      const loadingLines = [
        'Scanning scalp durability...',
        'Analyzing crypto stress levels...',
        'Checking leverage exposure...',
        'Measuring altcoin radiation...'
      ];
      let lineIndex = 0;

      result.innerHTML = `
        <div class="scanner-loading">
          <div class="scanner-title">CRYPTO SCALP SCANNER</div>
          <div class="scanner-line"></div>
        </div>
      `;

      const lineEl = result.querySelector('.scanner-line');
      const paintLine = () => {
        lineEl.textContent = loadingLines[lineIndex % loadingLines.length];
        lineIndex += 1;
      };

      paintLine();
      const intervalId = setInterval(paintLine, 300);
      return () => clearInterval(intervalId);
    }

    function setError(message) {
      result.innerHTML = `<div class="result-error">${message}</div>`;
    }

    async function exportResultAsImage() {
      const panel = result.querySelector('.analysis-panel');
      if (!panel) {
        throw new Error('No result to export yet.');
      }

      if (!window.htmlToImage || typeof window.htmlToImage.toBlob !== 'function') {
        throw new Error('Image export library is not loaded.');
      }

      const blob = await window.htmlToImage.toBlob(panel, {
        pixelRatio: 2,
        cacheBust: true,
        backgroundColor: '#2b1c18'
      });

      if (!blob) {
        throw new Error('Failed to generate image.');
      }

      const safeHandle = (panel.dataset.handle || 'user').replace(/[^a-z0-9_]/gi, '').toLowerCase() || 'user';
      return { blob, filename: `baldness-result-${safeHandle}.png` };
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function downloadResultImage() {
      const { blob, filename } = await exportResultAsImage();
      downloadBlob(blob, filename);
      return 'Image downloaded';
    }

    async function copyResultImage() {
      const { blob, filename } = await exportResultAsImage();

      if (!window.ClipboardItem || !navigator.clipboard || !navigator.clipboard.write) {
        downloadBlob(blob, filename);
        return 'Clipboard image copy is not supported. Downloaded instead.';
      }

      const item = new ClipboardItem({ 'image/png': blob });
      await navigator.clipboard.write([item]);
      return 'Image copied to clipboard';
    }

    function setExportStatus(message, isError = false) {
      const statusEl = result.querySelector('.export-status');
      if (!statusEl) return;
      statusEl.textContent = message;
      statusEl.style.color = isError ? '#ffc9c9' : '#d8f6ff';
    }

    function wireResultActions() {
      const downloadBtn = result.querySelector('[data-action="download-image"]');
      const copyBtn = result.querySelector('[data-action="copy-image"]');

      if (!downloadBtn || !copyBtn) return;

      downloadBtn.addEventListener('click', async () => {
        try {
          setExportStatus('Preparing image...');
          const done = await downloadResultImage();
          setExportStatus(done);
        } catch (error) {
          setExportStatus(error.message || 'Download failed.', true);
        }
      });

      copyBtn.addEventListener('click', async () => {
        try {
          setExportStatus('Preparing image...');
          const done = await copyResultImage();
          setExportStatus(done);
        } catch (error) {
          setExportStatus(error.message || 'Copy failed.', true);
        }
      });
    }

    function setPredictionResult(handle, year, message, roast, stats) {
      result.innerHTML = `
        <div class="analysis-panel" data-handle="${handle}">
          <div class="analysis-kicker">CRYPTO SCALP ANALYSIS</div>
          <div class="analysis-handle">Handle: @${handle}</div>
          <div class="analysis-label">BALDNESS YEAR</div>
          <div class="analysis-year">${year}</div>
          <div class="analysis-message">${message}</div>
          <div class="analysis-metrics">
            <div>Hairline stability: ${stats.hairlineStability}%</div>
            <div>Leverage exposure: ${stats.leverageExposure}</div>
            <div>Altcoin radiation: ${stats.altcoinRadiation}</div>
          </div>
          <div class="result-roast">${roast}</div>
          <div class="analysis-decor" aria-hidden="true">
            <svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg" role="presentation">
              <defs>
                <linearGradient id="waveStroke" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#60a5fa" />
                  <stop offset="50%" stop-color="#38bdf8" />
                  <stop offset="100%" stop-color="#2563eb" />
                </linearGradient>
                <linearGradient id="waveFill" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.28" />
                  <stop offset="100%" stop-color="#2563eb" stop-opacity="0.12" />
                </linearGradient>
                <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.45" />
                  <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
                </radialGradient>
                <filter id="blurSoft">
                  <feGaussianBlur stdDeviation="10" />
                </filter>
              </defs>

              <path d="M0,104 C95,72 165,134 255,104 C350,72 435,128 600,92 L600,140 L0,140 Z" fill="url(#waveFill)" />
              <path d="M-6,99 C82,66 170,129 257,100 C341,73 434,125 608,90" fill="none" stroke="url(#waveStroke)" stroke-width="2.4" stroke-linecap="round" />
              <path d="M-8,112 C92,88 170,137 261,112 C348,89 452,133 608,106" fill="none" stroke="#60a5fa" stroke-opacity="0.7" stroke-width="1.8" stroke-linecap="round" />

              <circle cx="78" cy="102" r="2.1" fill="#60a5fa" />
              <circle cx="168" cy="92" r="1.8" fill="#38bdf8" />
              <circle cx="320" cy="106" r="2.3" fill="#0ea5e9" />
              <circle cx="434" cy="94" r="1.9" fill="#60a5fa" />
              <circle cx="536" cy="104" r="2.2" fill="#38bdf8" />

              <ellipse cx="128" cy="110" rx="58" ry="22" fill="url(#glowBlue)" filter="url(#blurSoft)" />
              <ellipse cx="488" cy="112" rx="66" ry="24" fill="url(#glowBlue)" filter="url(#blurSoft)" />
            </svg>
          </div>
          <div class="result-watermark">by @PenguinWeb3</div>
        </div>
        <div class="result-actions">
          <button class="export-btn download-btn" type="button" data-action="download-image">Download Image</button>
          <button class="export-btn copy-btn" type="button" data-action="copy-image">Copy Image</button>
        </div>
        <div class="export-status" aria-live="polite"></div>
      `;
      wireResultActions();
    }

    function delay(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    handleInput.addEventListener('input', syncCaret);
    syncCaret();

    async function runPrediction() {
      const normalizedHandle = normalizeHandle(handleInput.value);

      if (!normalizedHandle) {
        setError('Please enter a handle.');
        return;
      }

      if (!isValidHandle(normalizedHandle)) {
        setError('Use 1-15 characters: letters, numbers, underscores only.');
        return;
      }

      const stopLoading = setLoadingState();
      const loadingMs = 800 + Math.floor(Math.random() * 401);
      await delay(loadingMs);
      stopLoading();

      const { year, hash } = predictBaldYear(normalizedHandle);
      const categoryMessage = getBaldnessMessage(year);
      const roastLine = getRoastLine(hash);
      const stats = getScannerStats(hash);
      setPredictionResult(normalizedHandle, year, categoryMessage, roastLine, stats);
    }

    predictBtn.addEventListener('click', runPrediction);
    handleInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        runPrediction();
      }
    });
  </script>
</body>
</html>
